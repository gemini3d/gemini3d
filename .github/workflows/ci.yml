name: ci

env:
  HOMEBREW_NO_INSTALL_CLEANUP: 1

on:
  push:
    paths-ignore:
      - "cmake/intel.cmake"
      - "cmake/cray.cmake"
      - ".github/workflows/ci_windows.yml"
      - ".github/workflows/ci_macos.yml"
      - ".github/workflows/oneapi-linux.yml"
      - "docs/**"
      - "scripts/**"
      - "**.md"

  workflow_dispatch:

# avoid wasted runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  gcc:
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        hwm14: [false]
        os: [ubuntu-latest]
        gcc: [11, 12, 13, 14]

    env:
      CC: gcc-${{ matrix.gcc }}
      CXX: g++-${{ matrix.gcc }}
      FC: gfortran-${{ matrix.gcc }}
      CMAKE: cmake
      CTEST: ctest

    runs-on: ${{ matrix.os }}

    steps:
    - &checkout
      uses: actions/checkout@v7

    - name: Install GCC if needed (Linux)
      shell: bash
      if: ${{ runner.os == 'Linux' && matrix.gcc < 12 }}
      run: sudo apt install -y --no-install-recommends gcc-${{ matrix.gcc }} g++-${{ matrix.gcc }} gfortran-${{ matrix.gcc }}

    - &pkg
      uses: ./.github/workflows/composite-pkg

    - &linux-build
      uses: ./.github/workflows/composite-unix


  cmake-oldest:
    timeout-minutes: 30

    runs-on: ubuntu-24.04

    strategy:
      matrix:
        cmake_version: ["3.25.3"]

    steps:

    - *checkout

    - *pkg

    - uses: ./.github/workflows/composite-cmake

    - *linux-build

  gnu_make:
    timeout-minutes: 15

    runs-on: ubuntu-latest

    steps:
    - *checkout
    - *pkg
    - run: cmake --workflow gmake
